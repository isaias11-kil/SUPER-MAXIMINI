version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: supermaximini-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - sqlserver_data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: supermaximini-db-init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./init.sql:/init.sql
    command: >
      bash -c '/opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "YourStrong!Passw0rd" -C -d master -i /init.sql && echo "Database initialized successfully" || echo "Database initialization failed"'

volumes:
  sqlserver_data:
